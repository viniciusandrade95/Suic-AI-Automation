      .num{font:800 18px Inter,Arial,sans-serif;fill:#caf6ff}
      .label{font:700 17px Inter,Arial,sans-serif;fill:#eef8ff}
      .muted{font:500 14px Inter,Arial,sans-serif;fill:#8fb0bf}
