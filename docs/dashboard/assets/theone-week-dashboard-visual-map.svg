  <rect x="1255" y="620" width="300" height="68" rx="16" class="box"/><text x="1273" y="648" class="h3" font-size="16">Chatbot precisa de tools</text><text x="1273" y="672" class="small">Sem tools, não controla nada.</text>
  <rect x="1255" y="700" width="300" height="68" rx="16" class="box"/><text x="1273" y="728" class="h3" font-size="16">VPS ainda é cedo</text><text x="1273" y="752" class="small">Primeiro provar local.</text>

  <text x="1255" y="805" class="tiny">RISCO PRINCIPAL</text>
