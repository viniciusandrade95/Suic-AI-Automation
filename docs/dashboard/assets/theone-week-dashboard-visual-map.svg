      .h1{fill:#F3F0E8;font-size:52px;font-weight:850;font-family:Inter,Arial,sans-serif;letter-spacing:-3px;}
      .h2{fill:#F3F0E8;font-size:22px;font-weight:750;font-family:Inter,Arial,sans-serif;letter-spacing:-0.6px;}
      .h3{fill:#F3F0E8;font-size:18px;font-weight:750;font-family:Inter,Arial,sans-serif;letter-spacing:-0.4px;}
