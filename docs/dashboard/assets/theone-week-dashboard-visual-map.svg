    <g transform="translate(246 0)"><rect width="112" height="150" rx="18" class="box"/><rect width="112" height="5" rx="3" fill="#65A6E8"/><text x="12" y="28" class="tiny" font-size="10">03 / SINAL</text><text x="12" y="55" class="h3" font-size="15">Signal</text><text x="12" y="75" class="h3" font-size="15">Engine</text><text x="12" y="104" class="small" font-size="12">Prioridade</text><rect x="12" y="128" width="88" height="7" rx="4" fill="rgba(243,240,232,.12)"/><rect x="12" y="128" width="11" height="7" rx="4" fill="#65A6E8"/></g>
    <g transform="translate(369 0)"><rect width="112" height="150" rx="18" class="box"/><rect width="112" height="5" rx="3" fill="#D6A44C"/><text x="12" y="28" class="tiny" font-size="10">04 / CORE</text><text x="12" y="55" class="h3" font-size="15">CRM</text><text x="12" y="75" class="h3" font-size="15">seed</text><text x="12" y="104" class="small" font-size="12">Tenant + local</text><rect x="12" y="128" width="88" height="7" rx="4" fill="rgba(243,240,232,.12)"/><rect x="12" y="128" width="9" height="7" rx="4" fill="#D6A44C"/></g>
    <g transform="translate(492 0)"><rect width="112" height="150" rx="18" class="box"/><rect width="112" height="5" rx="3" fill="#77B98A"/><text x="12" y="28" class="tiny" font-size="10">05 / VALOR</text><text x="12" y="55" class="h3" font-size="15">Booking</text><text x="12" y="75" class="h3" font-size="15">E2E</text><text x="12" y="104" class="small" font-size="12">/book/slug</text><rect x="12" y="128" width="88" height="7" rx="4" fill="rgba(243,240,232,.12)"/><rect x="12" y="128" width="5" height="7" rx="4" fill="#77B98A"/></g>
    <g transform="translate(615 0)"><rect width="112" height="150" rx="18" class="box"/><rect width="112" height="5" rx="3" fill="#65A6E8"/><text x="12" y="28" class="tiny" font-size="10">06 / CHAT</text><text x="12" y="55" class="h3" font-size="15">Chat</text><text x="12" y="75" class="h3" font-size="15">tools</text><text x="12" y="104" class="small" font-size="12">Controla UI</text><rect x="12" y="128" width="88" height="7" rx="4" fill="rgba(243,240,232,.12)"/><rect x="12" y="128" width="7" height="7" rx="4" fill="#65A6E8"/></g>
    <g transform="translate(738 0)"><rect width="112" height="150" rx="18" class="box"/><rect width="112" height="5" rx="3" fill="#4FBDB5"/><text x="12" y="28" class="tiny" font-size="10">07 / SAÍDA</text><text x="12" y="55" class="h3" font-size="15">QA +</text><text x="12" y="75" class="h3" font-size="15">VPS</text><text x="12" y="104" class="small" font-size="12">Deploy path</text><rect x="12" y="128" width="88" height="7" rx="4" fill="rgba(243,240,232,.12)"/><rect x="12" y="128" width="6" height="7" rx="4" fill="#4FBDB5"/></g>
