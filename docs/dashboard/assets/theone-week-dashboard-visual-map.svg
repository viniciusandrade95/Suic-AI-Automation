      <stop offset="0" stop-color="#111820"/>
      <stop offset="0.55" stop-color="#182127"/>
      <stop offset="1" stop-color="#0d1217"/>
    </linearGradient>
    <radialGradient id="lava1" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#4FBDB5" stop-opacity="0.42"/><stop offset="1" stop-color="#4FBDB5" stop-opacity="0"/></radialGradient>
    <radialGradient id="lava2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#E87545" stop-opacity="0.36"/><stop offset="1" stop-color="#E87545" stop-opacity="0"/></radialGradient>
