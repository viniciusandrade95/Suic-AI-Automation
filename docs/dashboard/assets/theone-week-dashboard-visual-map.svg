  <text x="1273" y="881" class="small">Mitigação: Signal Board domina.</text>

  <line x1="35" y1="905" x2="1565" y2="905" stroke="rgba(243,240,232,0.16)"/>
  <text x="62" y="940" class="small">Regra: uma tela = uma decisão principal. Um bloco = uma pergunta. Uma linha = uma ideia.</text>
  <text x="1190" y="940" class="small">Maquete de direção, não implementação final.</text>
