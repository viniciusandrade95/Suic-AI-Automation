  <rect x="1275" y="212" width="220" height="40" rx="16" fill="rgba(243,240,232,0.10)"/><text x="1290" y="237" class="small">Mostra o que importa agora.</text>
  <rect x="1275" y="265" width="260" height="56" rx="16" class="box2"/><text x="1290" y="288" class="small">Agora: primeira tela viva</text><text x="1290" y="310" class="small">com dados mockados.</text>
  <rect x="1275" y="335" width="218" height="40" rx="16" fill="rgba(243,240,232,0.10)"/><text x="1290" y="360" class="small">Porque booking bloqueia?</text>
  <rect x="1275" y="388" width="260" height="56" rx="16" class="box2"/><text x="1290" y="411" class="small">Falta seed: tenant, serviço,</text><text x="1290" y="433" class="small">local e slug demo.</text>

