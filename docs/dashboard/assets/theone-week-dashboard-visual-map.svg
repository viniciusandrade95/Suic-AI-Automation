    <g transform="translate(0 84)"><rect width="270" height="72" rx="16" class="box"/><rect x="13" y="14" width="30" height="30" rx="9" class="num"/><text x="23" y="35" fill="#F3F0E8" font-family="Inter,Arial" font-size="14" font-weight="800">2</text><text x="56" y="24" class="h3">Living UI</text><text x="56" y="48" class="small">Lava, cockpit, touch, boneco.</text><circle cx="58" cy="61" r="5" fill="#8E7DE8"/><text x="70" y="65" class="tiny" font-size="11">PROVAR SENSAÇÃO</text></g>
    <g transform="translate(0 168)"><rect width="270" height="72" rx="16" class="box"/><rect x="13" y="14" width="30" height="30" rx="9" class="num"/><text x="23" y="35" fill="#F3F0E8" font-family="Inter,Arial" font-size="14" font-weight="800">3</text><text x="56" y="24" class="h3">Signal Engine</text><text x="56" y="48" class="small">Eventos viram prioridade.</text><circle cx="58" cy="61" r="5" fill="#65A6E8"/><text x="70" y="65" class="tiny" font-size="11">CÉREBRO VISUAL</text></g>
    <g transform="translate(0 252)"><rect width="270" height="72" rx="16" class="box"/><rect x="13" y="14" width="30" height="30" rx="9" class="num"/><text x="23" y="35" fill="#F3F0E8" font-family="Inter,Arial" font-size="14" font-weight="800">4</text><text x="56" y="24" class="h3">CRM / Booking Core</text><text x="56" y="48" class="small">Tenant, serviço, local, marcação.</text><circle cx="58" cy="61" r="5" fill="#D6A44C"/><text x="70" y="65" class="tiny" font-size="11">VALOR REAL</text></g>
    <g transform="translate(0 336)"><rect width="270" height="72" rx="16" class="box"/><rect x="13" y="14" width="30" height="30" rx="9" class="num"/><text x="23" y="35" fill="#F3F0E8" font-family="Inter,Arial" font-size="14" font-weight="800">5</text><text x="56" y="24" class="h3">Booking público</text><text x="56" y="48" class="small">/book/slug até confirmação.</text><circle cx="58" cy="61" r="5" fill="#77B98A"/><text x="70" y="65" class="tiny" font-size="11">PRIMEIRO FLUXO</text></g>
    <g transform="translate(0 420)"><rect width="270" height="72" rx="16" class="box"/><rect x="13" y="14" width="30" height="30" rx="9" class="num"/><text x="23" y="35" fill="#F3F0E8" font-family="Inter,Arial" font-size="14" font-weight="800">6</text><text x="56" y="24" class="h3">Chatbot do dashboard</text><text x="56" y="48" class="small">Pergunta, filtra, muda vista.</text><circle cx="58" cy="61" r="5" fill="#65A6E8"/><text x="70" y="65" class="tiny" font-size="11">CONVERSÁVEL</text></g>
    <g transform="translate(0 504)"><rect width="270" height="72" rx="16" class="box"/><rect x="13" y="14" width="30" height="30" rx="9" class="num"/><text x="23" y="35" fill="#F3F0E8" font-family="Inter,Arial" font-size="14" font-weight="800">7</text><text x="56" y="24" class="h3">QA → VPS ready</text><text x="56" y="48" class="small">Build, smoke, envs, deploy path.</text><circle cx="58" cy="61" r="5" fill="#4FBDB5"/><text x="70" y="65" class="tiny" font-size="11">ORACLE DEPOIS</text></g>
